# Job definition for ASR Pipeline
# Each task defines a language/build configuration

tasks:
  # ===== English Task (ID: 69260) =====
  - msg: "en_nav_test"
    l: 69260
    is_yun: 0

    # Corpus paths (relative to asrmlg_exp_dir)
    excel_corpus_path: corpus/en_corpus.xlsx
    cp: corpus/en_corpus.xlsx

    # Resource paths
    dict: res/En_res/ubctc_duan/new_dict
    word_syms: res/En_res/ubctc_duan/words.syms
    phone_syms: res/En_res/ubctc_duan/phones.syms
    triphone_syms: res/En_res/ubctc_duan/triphones.syms
    hmm_list: res/En_res/ubctc_duan/hmm_list
    hmm_list_blank: res/En_res/ubctc_duan/hmm_list_blank
    mapping: res/En_res/ubctc_duan/mapping.txt

    # Pipeline switches
    enable_g2p: true
    enable_merge_dict: true
    enable_whisper_package: false

    # G2P behavior
    predict_phone_for_new: true

